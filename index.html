<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/perfil.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <title>Raul Martinez</title>
  </head>
  <body>
    <header>
      <div class="content-header">
        <div class="logo-letters">
          <span>&lt;</span>
          <span>Raúl</span>
          <span>/></span>
        </div>
        <ul>
          <li>
            <a href="#home">Inicio</a>
          </li>
          <li>
            <a href="#contact">Contacto</a>
          </li>
          <li>
            <a href="#portfolio">Portafolio</a>
          </li>
        </ul>
      </div>
    </header>
    <main>
      <section class="content-main home" id="home">
        <div class="content-presentation">
          <p class="presentation">Hola soy</p>
          <p class="name">Raúl Martinez</p>
          <p class="paragraph">Me dedico al desarrollo full stack y me apasiona la programación.</p>
          <p class="paragraph">Disfruto construir aplicaciones web completas, desde el desarrollo</p>
          <p class="paragraph">del backend hasta la implementación del frontend.</p>
        </div>
        <div class="diagonal">
          <div class="row-images to-right-row-1">
            <img src="/images/c++.png" alt="">
            <img src="/images/java.png" alt="">
            <img src="/images/python.png" alt="">
            <img src="/images/php.png" alt="">
            <img src="/images/haskell.png" alt="">
            <img src="/images/dart.svg" alt="">
          </div>
          <div class="row-images to-right-row-2">
            <img src="/images/bootstrap.png" alt="">
            <img src="/images/tailwind.png" alt="">
            <img src="/images/d3.png" alt="">
            <img src="/images/postman.png" alt="">
            <img src="/images/jquery.png" alt="">
          </div>
          <div class="row-images to-right-row-3">
            <img src="/images/angular.png" alt="">
            <img src="/images/react.png" alt="">
            <img src="/images/vue.png" alt="">
            <img src="/images/alpine.svg" alt="">
            <img src="/images/flutter.png" alt="">
            <img src="/images/nodejs.png" alt="">
            <img src="/images/springboot.png" alt="">
          </div>
          <div class="row-images to-right-row-4">
            <img src="/images/html.png" alt="">
            <img src="/images/css.png" alt="">
            <img src="/images/js.png" alt="">
            <img src="/images/ts.png" alt="">
          </div>
          <div class="row-images to-right-row-5">
            <img src="/images/mariadb.png" alt="">
            <img src="/images/mysql.png" alt="">
            <img src="/images/postgres.png" alt="">
            <img src="/images/mongo.png" alt="">
          </div>
        </div>
      </section>
      <section class="content-main">
        <div class="diving-line">
          <div class="line"></div>
          <div class="circle"></div>
          <div class="line"></div>
        </div>
      </section>
    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
